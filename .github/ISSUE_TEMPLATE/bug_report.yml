name: Bug Report
description: Report a bug in Rclone Web
labels: ["bug"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Functional — something doesn't work as expected
        - Visual / UI — layout, styling, or rendering issue
        - Performance — slow, unresponsive, or high resource usage
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please fill in the relevant details.
      placeholder: |
        Browser: Chrome 125
        OS: macOS 15.4
        rclone version: 1.68.0
    validations:
      required: true
